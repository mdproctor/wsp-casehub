<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" width="920" height="420" font-family="'Segoe UI', system-ui, sans-serif">

  <!-- Background -->
  <rect width="920" height="420" fill="#f8f9fa" rx="12"/>

  <!-- ═══════════════════════════════════════════
       LEFT PANEL — Layered Architecture
  ════════════════════════════════════════════ -->

  <rect x="12" y="12" width="388" height="396" fill="white" rx="8" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Panel title -->
  <text x="206" y="42" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e">Layered Architecture</text>
  <text x="206" y="58" text-anchor="middle" font-size="11" fill="#888">organised by technical concern</text>

  <!-- Feature column header labels -->
  <text x="84"  y="82" text-anchor="middle" font-size="11" fill="#555">Feature A</text>
  <text x="206" y="82" text-anchor="middle" font-size="11" fill="#555">Feature B</text>
  <text x="328" y="82" text-anchor="middle" font-size="11" fill="#555">Feature C</text>

  <!-- Feature A column highlight — semi-transparent, shows it spans all layers -->
  <rect x="24" y="89" width="120" height="252" fill="#fee2e2" rx="4" opacity="0.6"/>

  <!-- Layer bands -->
  <rect x="24" y="89"  width="364" height="58" fill="#dbeafe" rx="4" opacity="0.7"/>
  <rect x="24" y="155" width="364" height="58" fill="#ede9fe" rx="4" opacity="0.7"/>
  <rect x="24" y="221" width="364" height="58" fill="#dcfce7" rx="4" opacity="0.7"/>
  <rect x="24" y="287" width="364" height="58" fill="#fef9c3" rx="4" opacity="0.7"/>

  <!-- Layer name labels -->
  <text x="150" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Presentation Layer</text>
  <text x="150" y="188" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">Business Logic Layer</text>
  <text x="150" y="254" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Data Access Layer</text>
  <text x="150" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Database</text>

  <!-- Feature column dividers -->
  <line x1="144" y1="89" x2="144" y2="345" stroke="#aaa" stroke-dasharray="5,4" stroke-width="1.5"/>
  <line x1="264" y1="89" x2="264" y2="345" stroke="#aaa" stroke-dasharray="5,4" stroke-width="1.5"/>

  <!-- Feature A brace arrow on right side of panel -->
  <line x1="374" y1="95"  x2="385" y2="95"  stroke="#ef4444" stroke-width="1.5"/>
  <line x1="385" y1="95"  x2="385" y2="339" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="374" y1="339" x2="385" y2="339" stroke="#ef4444" stroke-width="1.5"/>
  <text x="388" y="222" font-size="11" fill="#ef4444" transform="rotate(90,388,222)" text-anchor="middle">every feature touches every layer</text>

  <!-- Warning label -->
  <text x="206" y="372" text-anchor="middle" font-size="11" fill="#ef4444">⚠ a change to Feature A touches all 4 layers</text>


  <!-- ═══════════════════════════════════════════
       CENTER STRIP — Row labels + VS
  ════════════════════════════════════════════ -->

  <!-- VS badge -->
  <rect x="426" y="24" width="68" height="28" fill="#e5e7eb" rx="14"/>
  <text x="460" y="42" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280">vs</text>

  <!-- Row labels -->
  <text x="460" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">UI</text>
  <text x="460" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">BL</text>
  <text x="460" y="250" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Data</text>
  <text x="460" y="316" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">DB</text>

  <!-- Connector lines left -->
  <line x1="400" y1="118" x2="444" y2="118" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="400" y1="184" x2="444" y2="184" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="400" y1="250" x2="444" y2="250" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="400" y1="316" x2="444" y2="316" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Connector lines right -->
  <line x1="476" y1="118" x2="520" y2="118" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="476" y1="184" x2="520" y2="184" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="476" y1="250" x2="520" y2="250" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="476" y1="316" x2="520" y2="316" stroke="#cbd5e1" stroke-width="1"/>


  <!-- ═══════════════════════════════════════════
       RIGHT PANEL — Vertical Slice Architecture
  ════════════════════════════════════════════ -->

  <rect x="520" y="12" width="388" height="396" fill="white" rx="8" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Panel title -->
  <text x="714" y="42" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e">Vertical Slice Architecture</text>
  <text x="714" y="58" text-anchor="middle" font-size="11" fill="#888">organised by business feature</text>

  <!-- Feature column header labels -->
  <text x="598" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Feature A</text>
  <text x="718" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">Feature B</text>
  <text x="838" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Feature C</text>

  <!-- Feature A column (blue) -->
  <rect x="532" y="89"  width="120" height="58" fill="#bfdbfe" rx="4"/>
  <rect x="532" y="155" width="120" height="58" fill="#c4b5fd" rx="4"/>
  <rect x="532" y="221" width="120" height="58" fill="#bbf7d0" rx="4"/>
  <rect x="532" y="287" width="120" height="58" fill="#fef08a" rx="4"/>

  <!-- Feature B column (purple) -->
  <rect x="658" y="89"  width="120" height="58" fill="#93c5fd" rx="4"/>
  <rect x="658" y="155" width="120" height="58" fill="#a78bfa" rx="4"/>
  <rect x="658" y="221" width="120" height="58" fill="#86efac" rx="4"/>
  <rect x="658" y="287" width="120" height="58" fill="#fde047" rx="4"/>

  <!-- Feature C column (green) -->
  <rect x="784" y="89"  width="112" height="58" fill="#60a5fa" rx="4"/>
  <rect x="784" y="155" width="112" height="58" fill="#8b5cf6" rx="4"/>
  <rect x="784" y="221" width="112" height="58" fill="#4ade80" rx="4"/>
  <rect x="784" y="287" width="112" height="58" fill="#facc15" rx="4"/>

  <!-- Cell labels -->
  <text x="592" y="122" text-anchor="middle" font-size="11" fill="#1e3a5f">UI(A)</text>
  <text x="592" y="188" text-anchor="middle" font-size="11" fill="#3b0764">BL(A)</text>
  <text x="592" y="254" text-anchor="middle" font-size="11" fill="#14532d">DA(A)</text>
  <text x="592" y="320" text-anchor="middle" font-size="11" fill="#713f12">DB(A)</text>

  <text x="718" y="122" text-anchor="middle" font-size="11" fill="#1e3a5f">UI(B)</text>
  <text x="718" y="188" text-anchor="middle" font-size="11" fill="#3b0764">BL(B)</text>
  <text x="718" y="254" text-anchor="middle" font-size="11" fill="#14532d">DA(B)</text>
  <text x="718" y="320" text-anchor="middle" font-size="11" fill="#713f12">DB(B)</text>

  <text x="840" y="122" text-anchor="middle" font-size="11" fill="#1e3a5f">UI(C)</text>
  <text x="840" y="188" text-anchor="middle" font-size="11" fill="#3b0764">BL(C)</text>
  <text x="840" y="254" text-anchor="middle" font-size="11" fill="#14532d">DA(C)</text>
  <text x="840" y="320" text-anchor="middle" font-size="11" fill="#713f12">DB(C)</text>

  <!-- Success label -->
  <text x="714" y="372" text-anchor="middle" font-size="11" fill="#16a34a">✓ a change to Feature A stays in one column</text>

</svg>
